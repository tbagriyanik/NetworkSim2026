name: Update README Badges

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  update-badges:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Count Lines and Update Badges
        run: node scripts/update-readme-badges.cjs

      - name: Commit if Changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update README badges (lines/files)"
          file_pattern: README.md
